<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIPUSTAKA – {% block title %}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebar: '#0f172a',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex">

  <!-- ── SIDEBAR ── -->
  <aside class="w-60 min-h-screen bg-[#0f172a] text-white flex flex-col fixed top-0 left-0 bottom-0 z-30">

    <!-- Brand -->
    <div class="px-5 pt-7 pb-6">
      <p class="text-[10px] tracking-widest text-slate-400 uppercase font-semibold">S I P U S T A K A</p>
      <div class="flex items-center gap-3 mt-2">
        <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm flex-shrink-0">P</div>
        <span class="font-bold text-sm leading-tight">Sistem Peminjaman<br>Buku</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 space-y-1">
      <a href="{% url 'dashboard' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition
                {% if request.resolver_match.url_name == 'dashboard' %}bg-white/10 text-white{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">
        <!-- grid icon -->
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="2"/>
          <rect x="3" y="14" width="7" height="7" rx="1" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="2"/>
        </svg>
        Dashboard
      </a>

      <a href="{% url 'buku_list' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition
                {% if 'buku' in request.resolver_match.url_name %}bg-white/10 text-white{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">
        <!-- book icon -->
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
          <path stroke-width="2" d="M4 19.5A2.5 2.5 0 016.5 22H20V2H6.5A2.5 2.5 0 004 4.5v15z"/>
        </svg>
        Buku
      </a>

      <a href="{% url 'peminjaman_list' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition
                {% if 'peminjaman' in request.resolver_match.url_name %}bg-white/10 text-white{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">
        <!-- clipboard icon -->
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1" stroke-width="2"/>
        </svg>
        Peminjaman
      </a>

      <a href="{% url 'siswa_list' %}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition
                {% if 'siswa' in request.resolver_match.url_name %}bg-white/10 text-white{% else %}text-slate-400 hover:bg-white/5 hover:text-white{% endif %}">
        <!-- users icon -->
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4" stroke-width="2"/>
          <path stroke-width="2" d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
        </svg>
        User
      </a>
    </nav>

    <!-- Admin card -->
    <div class="m-4 bg-white/10 rounded-xl px-4 py-3">
      <p class="text-[10px] text-slate-400 uppercase tracking-wider">Admin Aktif</p>
      <p class="font-semibold text-sm mt-0.5">Nizar Az zaid</p>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="ml-60 flex-1 flex flex-col min-h-screen">

    <!-- Flash messages -->
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
      {% for msg in messages %}
      <div class="px-5 py-3 rounded-lg shadow-lg text-sm font-medium
                  {% if msg.tags == 'success' %}bg-green-500 text-white{% else %}bg-red-500 text-white{% endif %}">
        {{ msg }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <main class="flex-1 p-8">
      {% block content %}{% endblock %}
    </main>
  </div>

</body>
</html>
