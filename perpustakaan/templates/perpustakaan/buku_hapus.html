{% extends 'perpustakaan/base.html' %}

{% block title %}Konfirmasi Hapus Buku{% endblock %}

{% block content %}
<div class="max-w-md bg-white rounded-2xl border border-slate-200/80 p-6 shadow-sm mx-auto my-12 text-center">
  <div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4">
    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
  </div>
  
  <h2 class="text-lg font-bold text-slate-800">Hapus Data Buku?</h2>
  <p class="text-xs text-slate-400 mt-1 px-4">Tindakan ini permanen. Apakah Anda yakin ingin menghapus buku berjudul <strong class="text-slate-700">"{{ object.judul }}"</strong>?</p>

  <form method="POST" class="mt-6 flex justify-center gap-3">
    {% csrf_token %}
    <a href="{% url 'buku_list' %}" class="px-4 py-2 border border-slate-200 text-slate-500 rounded-xl text-xs font-medium hover:bg-slate-50 transition">Batal</a>
    <button type="submit" class="px-4 py-2 bg-rose-600 text-white rounded-xl text-xs font-medium hover:bg-rose-700 transition shadow-sm">Ya, Hapus Buku</button>
  </form>
</div>
{% endblock %}
